<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D1547">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">
  <title>Page Not Found | Delta Blue Machinery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0D1547;--gold:#F5C400;--gd:#C99E00;--light:#EEF0FA;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'Barlow',sans-serif;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px;text-align:center;position:relative;overflow:hidden}
    .dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
    .glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(245,196,0,.06) 0%,transparent 70%);pointer-events:none}
    .num{font-family:'Barlow Condensed',sans-serif;font-size:clamp(120px,20vw,220px);font-weight:900;line-height:1;color:rgba(245,196,0,.12);letter-spacing:-.02em;position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);user-select:none;pointer-events:none}
    .content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px}
    .label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);opacity:.8}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(36px,7vw,72px);font-weight:900;text-transform:uppercase;color:#fff;line-height:.95;letter-spacing:-.01em}
    h1 span{color:var(--gold)}
    p{font-size:16px;color:rgba(255,255,255,.5);line-height:1.75;max-width:440px}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .btn{display:inline-flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.09em;text-transform:uppercase;text-decoration:none;padding:14px 28px;border-radius:2px;cursor:pointer;transition:transform .2s,background .2s}
    .btn:hover{transform:translateY(-2px)}
    .bg{background:var(--gold);color:var(--navy)}
    .bg:hover{background:var(--gd)}
    .bh{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.15)}
    .bh:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:12px;text-decoration:none}
    .logo img{height:40px}
    .logo span{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#fff;letter-spacing:.06em;line-height:1.1}
    .logo em{display:block;font-style:normal;font-size:11px;opacity:.5;letter-spacing:.16em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="dots"></div>
  <div class="glow"></div>
  <div class="num">404</div>

  <div class="content">
    <a href="/" class="logo">
      <img src="logo.png" alt="Delta Blue Machinery" onerror="this.outerHTML='<div style=\'width:40px;height:40px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center\'><svg width=20 height=20 viewBox=\'0 0 20 20\' fill=\'none\'><polygon points=\'10,2 18,17 2,17\' fill=\'#0D1547\'/></svg></div>'">
      <span>Delta Blue<em>Machinery</em></span>
    </a>
    <div class="label">404 — Page Not Found</div>
    <h1>Wrong<br><span>Dig Site.</span></h1>
    <p>The page you are looking for does not exist or may have been moved. Head back to the main site to find what you need.</p>
    <div class="btns">
      <a href="/" class="btn bg">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to Home
      </a>
      <a href="/#equipment" class="btn bh">Browse Equipment</a>
    </div>
  </div>
</body>
</html>
